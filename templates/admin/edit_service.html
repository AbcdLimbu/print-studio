{% extends 'admin/base_admin.html' %}
{% block title %}Edit Service - Admin{% endblock %}
{% block page_title %}Edit Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Service Name</label>
                            <input type="text" name="name" class="form-control" value="{{ service.name }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Starting Price (₹)</label>
                            <input type="number" name="starting_price" class="form-control" value="{{ service.starting_price }}" step="0.01">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="4">{{ service.description }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Current Image</label>
                            {% if service.image_url %}
                            <div class="mb-2">
                                <img src="{{ service.image_url }}" style="height:100px; border-radius:8px; object-fit:cover;">
                                <small class="text-muted d-block mt-1">Upload new to replace</small>
                            </div>
                            {% endif %}
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if service.is_active %}checked{% endif %}>
                                <label class="form-check-label fw-semibold" for="is_active">Service Active (visible to customers)</label>
                            </div>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-warning fw-semibold px-4">
                                <i class="fas fa-save me-2"></i>Update Service
                            </button>
                            <a href="{{ url_for('admin.services') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
