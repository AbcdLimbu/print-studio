{% extends 'admin/base_admin.html' %}
{% block title %}Add Service - Admin{% endblock %}
{% block page_title %}Add New Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Service Name</label>
                                <input type="text" name="name" class="form-control" placeholder="e.g. Digital Printing" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Starting Price (₹)</label>
                                <input type="number" name="starting_price" class="form-control" placeholder="0.00" step="0.01">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea name="description" class="form-control" rows="4" placeholder="Describe the service..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Service Image</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                                <small class="text-muted">Image will be uploaded to Cloudinary automatically</small>
                            </div>
                            <div class="col-12 d-flex gap-2 mt-2">
                                <button type="submit" class="btn btn-warning fw-semibold px-4">
                                    <i class="fas fa-save me-2"></i>Save Service
                                </button>
                                <a href="{{ url_for('admin.services') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                            </div>
                        </div>
                    </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
