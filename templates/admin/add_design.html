{% extends 'admin/base_admin.html' %}
{% block title %}Add Design - Admin{% endblock %}
{% block page_title %}Add Predefined Design{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Design Name</label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Business Card Template 1" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Category</label>
                            <select name="category" class="form-select">
                                <option value="">Select Category</option>
                                <option>Business Cards</option>
                                <option>Brochures</option>
                                <option>Letter Heads</option>
                                <option>Bill Books</option>
                                <option>ID Cards</option>
                                <option>Banners</option>
                                <option>Calendars</option>
                                <option>Wedding Cards</option>
                                <option>Thank You Cards</option>
                                <option>Certificates</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Design Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                            <small class="text-muted">Upload the design template image</small>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-warning fw-semibold px-4">
                                <i class="fas fa-save me-2"></i>Save Design
                            </button>
                            <a href="{{ url_for('admin.designs') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
